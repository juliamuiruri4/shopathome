name: Trigger auto deployment for container-app-zaf45dztj43ag

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - 'fastify-api-server/**'
    - '.github/workflows/container-app-zaf45dztj43ag-AutoDeployTrigger-010ebd67-0122-403f-a647-aa853cbde590.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.CONTAINERAPPZAF45DZTJ43AG_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CONTAINERAPPZAF45DZTJ43AG_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CONTAINERAPPZAF45DZTJ43AG_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/fastify-api-server 
          registryUrl: 
          registryUsername: ${{ secrets.CONTAINERAPPZAF45DZTJ43AG_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CONTAINERAPPZAF45DZTJ43AG_REGISTRY_PASSWORD }}
          containerAppName: container-app-zaf45dztj43ag
          resourceGroup: shopathome814b
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


