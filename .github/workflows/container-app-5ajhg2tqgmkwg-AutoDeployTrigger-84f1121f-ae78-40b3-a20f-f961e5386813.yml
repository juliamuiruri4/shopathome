name: Trigger auto deployment for container-app-5ajhg2tqgmkwg

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ start ]
    paths:
    - 'api/**'
    - '.github/workflows/container-app-5ajhg2tqgmkwg-AutoDeployTrigger-84f1121f-ae78-40b3-a20f-f961e5386813.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.CONTAINERAPP5AJHG2TQGMKWG_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CONTAINERAPP5AJHG2TQGMKWG_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CONTAINERAPP5AJHG2TQGMKWG_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/api 
          registryUrl: 
          registryUsername: ${{ secrets.CONTAINERAPP5AJHG2TQGMKWG_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CONTAINERAPP5AJHG2TQGMKWG_REGISTRY_PASSWORD }}
          containerAppName: container-app-5ajhg2tqgmkwg
          resourceGroup: shopathomea0da
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


